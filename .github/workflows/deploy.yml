name: Deploy to GitHub Pages

on:
  # Trigger deployment saat ada push ke branch main atau master
  push:
    branches:
      - main
      - master
  # Memungkinkan workflow dijalankan manual melalui tab Actions
  workflow_dispatch:

# Mengatur permissions GITHUB_TOKEN agar bisa mendeploy ke Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Hanya memproses satu deploy dalam satu waktu
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build aplikasi Murni HTML
        run: npm run build

      - name: Disable Jekyll
        run: touch ./dist/.nojekyll

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Build Artifact (dist folder)
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
